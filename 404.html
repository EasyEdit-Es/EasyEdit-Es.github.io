<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>404 — Página no encontrada | HexaLabStudio</title>
  <meta name="description" content="Esta página no existe. Vuelve al inicio de HexaLabStudio."/>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="theme-color" content="#00f0ff"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="apple-touch-icon" href="favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cyan:       #00f0ff;
      --cyan-mid:   #00c4d4;
      --cyan-dark:  #007a8a;
      --violet:     #6b2fff;
      --violet-mid: #8f5fff;
      --gold:       #ffe066;
      --gold-mid:   #ffb700;
      --dark:       #03060d;
      --dark-2:     #060c1a;
      --dark-3:     #091527;
      --surface:    #0c1e38;
      --text:       #e8f8ff;
      --text-2:     #9bbfcf;
      --muted:      #3a6070;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Rajdhani', system-ui, sans-serif;
      overflow: hidden;
      cursor: none;
      display: flex; align-items: center; justify-content: center;
    }

    /* CURSOR */
    #cursor {
      position: fixed; width: 10px; height: 10px;
      background: var(--cyan); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
      box-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan-mid);
      mix-blend-mode: screen;
    }
    #cursor-ring {
      position: fixed; width: 32px; height: 32px;
      border: 1.5px solid rgba(0,240,255,.5); border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%,-50%);
      transition: width .3s ease, height .3s ease;
    }

    /* NOISE */
    body::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9997;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: .5;
    }

    /* CANVAS */
    #bg { position: fixed; inset: 0; z-index: 0; opacity: .35; pointer-events: none; }

    /* HUD CORNERS */
    .hud-corner { position: fixed; width: 52px; height: 52px; pointer-events: none; z-index: 2; opacity: .5; }
    .hud-corner.tl { top: 20px; left: 20px; border-top: 1.5px solid var(--cyan); border-left: 1.5px solid var(--cyan); }
    .hud-corner.tr { top: 20px; right: 20px; border-top: 1.5px solid var(--cyan); border-right: 1.5px solid var(--cyan); }
    .hud-corner.bl { bottom: 20px; left: 20px; border-bottom: 1.5px solid var(--violet); border-left: 1.5px solid var(--violet); }
    .hud-corner.br { bottom: 20px; right: 20px; border-bottom: 1.5px solid var(--violet); border-right: 1.5px solid var(--violet); }

    /* SCANLINES */
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.04) 2px, rgba(0,0,0,.04) 4px);
    }

    /* MAIN CARD */
    .card {
      position: relative; z-index: 10;
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 1.5rem;
      padding: 2rem;
      max-width: 640px;
    }

    /* LOGO */
    .logo-wrap {
      position: relative; width: 100px; height: 100px; margin-bottom: .5rem;
    }
    .logo-wrap img {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 16px rgba(0,240,255,.6)) drop-shadow(0 0 40px rgba(107,47,255,.3));
      animation: breathe 4s ease-in-out infinite;
    }
    .logo-orbit {
      position: absolute; inset: -20px; border-radius: 50%;
      border: 1px solid rgba(0,240,255,.15);
      animation: orbit 10s linear infinite;
    }
    .logo-orbit-dot {
      position: absolute; top: 50%; left: -4px;
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--cyan); margin-top: -3.5px;
      box-shadow: 0 0 10px var(--cyan);
    }
    @keyframes breathe {
      0%,100% { filter: drop-shadow(0 0 12px rgba(0,240,255,.5)) drop-shadow(0 0 30px rgba(107,47,255,.25)); }
      50%      { filter: drop-shadow(0 0 22px rgba(0,240,255,.8)) drop-shadow(0 0 55px rgba(107,47,255,.5)); }
    }
    @keyframes orbit { to { transform: rotate(360deg); } }

    /* 404 NUMBER */
    .error-num {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(6rem, 18vw, 10rem);
      font-weight: 900; line-height: 1;
      letter-spacing: .05em;
      background: linear-gradient(135deg, var(--cyan), var(--violet-mid));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 40px rgba(0,240,255,.3));
      position: relative;
      animation: glitch-num 6s infinite;
    }
    @keyframes glitch-num {
      0%,89%,95%,100% { transform: none; filter: drop-shadow(0 0 40px rgba(0,240,255,.3)); }
      90% { transform: translate(-5px, 2px) skewX(-3deg); filter: drop-shadow(-5px 0 0 var(--violet)) drop-shadow(5px 0 0 var(--cyan)); }
      92% { transform: translate(5px, -2px) skewX(3deg); filter: drop-shadow(5px 0 0 var(--violet)) drop-shadow(-5px 0 0 var(--cyan)); }
      93% { transform: translate(-3px, 0); }
    }

    /* TAG */
    .error-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: .72rem; letter-spacing: .2em; text-transform: uppercase;
      color: var(--gold);
      display: flex; align-items: center; gap: .5rem;
      margin-top: -.5rem;
    }
    .error-tag::before, .error-tag::after {
      content: ''; width: 30px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .error-tag::after { background: linear-gradient(270deg, transparent, var(--gold)); }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: .06em; line-height: 1;
    }
    h1 em { font-style: normal; color: var(--cyan); }

    p {
      color: var(--text-2); line-height: 1.75; font-size: 1.05rem;
      max-width: 420px;
    }

    /* TERMINAL LINE */
    .terminal {
      font-family: 'Share Tech Mono', monospace;
      font-size: .8rem; color: rgba(0,240,255,.5);
      letter-spacing: .08em;
      padding: .6rem 1.2rem;
      border: 1px solid rgba(0,240,255,.12);
      border-radius: .5rem;
      background: rgba(0,240,255,.03);
      display: flex; align-items: center; gap: .6rem;
    }
    .terminal-cursor {
      display: inline-block; width: 8px; height: 1em;
      background: var(--cyan); opacity: .8;
      animation: blink .8s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:.8} 50%{opacity:0} }

    /* BUTTONS */
    .btn-row { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .btn {
      display: inline-flex; align-items: center; gap: .6rem;
      border: 0; border-radius: .6rem; padding: .85rem 1.6rem;
      text-decoration: none; font-weight: 700;
      font-family: 'Rajdhani', sans-serif;
      font-size: .95rem; letter-spacing: .08em; text-transform: uppercase;
      cursor: none; transition: all .3s cubic-bezier(.34,1.56,.64,1);
      position: relative; overflow: hidden;
    }
    .btn::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
      transition: left .5s;
    }
    .btn:hover::before { left: 100%; }
    .btn:hover { transform: translateY(-3px) scale(1.03); }
    .btn-cyan {
      background: linear-gradient(120deg, var(--cyan-dark), var(--cyan-mid), var(--cyan));
      color: #000; box-shadow: 0 0 24px rgba(0,240,255,.35), 0 8px 24px rgba(0,0,0,.4);
    }
    .btn-cyan:hover { box-shadow: 0 0 44px rgba(0,240,255,.6), 0 12px 32px rgba(0,0,0,.5); }
    .btn-ghost {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1);
      color: var(--text); backdrop-filter: blur(12px);
    }
    .btn-ghost:hover { border-color: rgba(0,240,255,.35); }

    /* BRAND FOOTER */
    .brand-foot {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      font-family: 'Share Tech Mono', monospace; font-size: .65rem;
      color: var(--muted); letter-spacing: .15em; text-transform: uppercase;
      z-index: 10; white-space: nowrap;
    }

    @media (max-width: 480px) {
      body { overflow: auto; align-items: flex-start; padding: 4rem 1rem 6rem; }
      .card { padding: 1.5rem 1rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>
  <div id="cursor"></div>
  <div id="cursor-ring"></div>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="hud-corner tl" aria-hidden="true"></div>
  <div class="hud-corner tr" aria-hidden="true"></div>
  <div class="hud-corner bl" aria-hidden="true"></div>
  <div class="hud-corner br" aria-hidden="true"></div>

  <main class="card" role="main">
    <!-- LOGO -->
    <div class="logo-wrap">
      <div class="logo-orbit"><div class="logo-orbit-dot"></div></div>
      <img src="logo.svg" alt="HexaLabStudio"/>
    </div>

    <!-- 404 -->
    <div class="error-num" aria-label="Error 404">404</div>
    <div class="error-tag">SECTOR NO ENCONTRADO</div>

    <!-- TEXT -->
    <h1>MAPA <em>FUERA</em><br>DE ROTACIÓN</h1>
    <p>Esta página no existe o fue eliminada del servidor. Puede que el mapa esté en mantenimiento o que el código de isla haya cambiado.</p>

    <!-- TERMINAL -->
    <div class="terminal" aria-hidden="true">
      <span>ERR_404 &nbsp;·&nbsp; PAGE_NOT_FOUND &nbsp;·&nbsp; REROUTING</span>
      <span class="terminal-cursor"></span>
    </div>

    <!-- BUTTONS -->
    <div class="btn-row">
      <a class="btn btn-cyan" href="index.html">⬡ &nbsp;Volver al inicio</a>
      <a class="btn btn-ghost" href="fortnite-multiplayer.html">Ver Fortnite MP →</a>
    </div>
  </main>

  <div class="brand-foot" aria-hidden="true">© HEXALABSTUDIO · UEFN MAPS</div>

  <script>
    // CURSOR
    const cur = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove', e => {
      mx=e.clientX; my=e.clientY;
      cur.style.left=`${mx}px`; cur.style.top=`${my}px`;
    }, {passive:true});
    (function rl(){ rx+=(mx-rx)*.1; ry+=(my-ry)*.1;
      ring.style.left=`${rx}px`; ring.style.top=`${ry}px`;
      requestAnimationFrame(rl); })();
    document.querySelectorAll('a,.btn').forEach(el=>{
      el.addEventListener('mouseenter',()=>{ cur.style.width='16px'; cur.style.height='16px'; ring.style.width='48px'; ring.style.height='48px'; });
      el.addEventListener('mouseleave',()=>{ cur.style.width='10px'; cur.style.height='10px'; ring.style.width='32px'; ring.style.height='32px'; });
    });

    // GRID CANVAS
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    window.addEventListener('resize', ()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; draw(); });
    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const step=64;
      ctx.strokeStyle='rgba(0,240,255,0.04)'; ctx.lineWidth=1;
      for(let x=0;x<=canvas.width;x+=step){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke(); }
      for(let y=0;y<=canvas.height;y+=step){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke(); }
      ctx.fillStyle='rgba(0,240,255,0.07)';
      for(let x=0;x<=canvas.width;x+=step){ for(let y=0;y<=canvas.height;y+=step){ ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill(); }}
    }
    draw();

    // PARTICLES
    const pc = document.createElement('canvas');
    pc.style.cssText='position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.4;';
    document.body.appendChild(pc);
    const pctx = pc.getContext('2d');
    pc.width=window.innerWidth; pc.height=window.innerHeight;
    window.addEventListener('resize',()=>{ pc.width=window.innerWidth; pc.height=window.innerHeight; });
    const COLS=['#00f0ff','#6b2fff','#8f5fff','#ffe066'];
    class P{
      constructor(){ this.reset(); }
      reset(){ this.x=Math.random()*pc.width; this.y=pc.height+10; this.vx=(Math.random()-.5)*.8; this.vy=-(0.4+Math.random()*1.6); this.size=.8+Math.random()*2.5; this.col=COLS[Math.floor(Math.random()*COLS.length)]; this.life=0; this.max=100+Math.random()*160; this.w=Math.random()*Math.PI*2; }
      tick(){ this.w+=.03; this.x+=this.vx+Math.sin(this.w)*.3; this.y+=this.vy; this.life++; if(this.life>this.max||this.y<-10)this.reset(); }
      draw(){ const p=this.life/this.max, a=p<.15?p/.15:1-((p-.15)/.85); pctx.save(); pctx.globalAlpha=a*.55; pctx.shadowBlur=8; pctx.shadowColor=this.col; pctx.fillStyle=this.col; pctx.beginPath(); pctx.arc(this.x,this.y,this.size,0,Math.PI*2); pctx.fill(); pctx.restore(); }
    }
    const pts=Array.from({length:40},()=>{ const p=new P(); p.life=Math.random()*p.max; return p; });
    (function loop(){ pctx.clearRect(0,0,pc.width,pc.height); pts.forEach(p=>{p.tick();p.draw();}); requestAnimationFrame(loop); })();

    // AUTO-REDIRECT after 15s (optional — comment out if you don't want it)
    let secs = 15;
    const terminal = document.querySelector('.terminal span');
    const timer = setInterval(()=>{
      secs--;
      if(terminal) terminal.textContent = `ERR_404 · PAGE_NOT_FOUND · REDIRECT IN ${secs}s`;
      if(secs <= 0){ clearInterval(timer); window.location.href='index.html'; }
    }, 1000);
    // Cancel redirect if user interacts
    document.querySelectorAll('a').forEach(a => a.addEventListener('click', () => clearInterval(timer)));
  </script>
</body>
</html>
